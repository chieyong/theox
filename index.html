<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De Stille Os en de Zilveren Kraanvogel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#F8F5EF" />
  <style>
    /* ─── LANDING PAGE ─── */
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 6rem 2rem 8rem;
    }

    .landing-header {
      text-align: center;
      margin-bottom: 5rem;
    }

    .landing-series {
      font-family: var(--font-head);
      font-size: 0.72rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    .landing-title {
      font-family: var(--font-head);
      font-size: clamp(1.8rem, 4.5vw, 3rem);
      font-weight: 300;
      line-height: 1.2;
      letter-spacing: 0.03em;
    }

    .landing-author {
      margin-top: 0.9rem;
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--ink-muted);
      font-style: italic;
      letter-spacing: 0.05em;
    }

    .landing-rule {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 2rem auto 0;
      opacity: 0.5;
    }

    /* ─── CARD GRID ─── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 300px));
      gap: 2rem;
      justify-content: center;
      max-width: 900px;
      width: 100%;
    }

    .story-card {
      position: relative;
      border: 1px solid var(--accent);
      padding: 2.4rem 2rem 2rem;
      text-decoration: none;
      color: var(--ink);
      overflow: hidden;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      min-height: 280px;
    }

    .story-card:not(.story-card--soon):hover {
      border-color: var(--ink);
      box-shadow: 0 4px 24px rgba(28, 26, 23, 0.07);
    }

    .story-card--soon {
      opacity: 0.6;
      cursor: default;
      pointer-events: none;
    }

    .card-illus {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center bottom;
      mix-blend-mode: multiply;
      opacity: 0.1;
      pointer-events: none;
      user-select: none;
    }

    .card-content {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-deel {
      font-family: var(--font-head);
      font-size: 0.68rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.9rem;
    }

    .card-title {
      font-family: var(--font-head);
      font-size: 1.35rem;
      font-weight: 400;
      line-height: 1.25;
      margin-bottom: 0.7rem;
    }

    .card-subtitle {
      font-size: 0.82rem;
      color: var(--ink-muted);
      font-style: italic;
      line-height: 1.5;
      flex: 1;
    }

    .card-cta {
      margin-top: 2rem;
      font-family: var(--font-head);
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .card-soon-label {
      margin-top: 2rem;
      font-family: var(--font-body);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      color: var(--ink);
    }

    /* ─── FOOTER LINK ─── */
    .landing-footer {
      margin-top: 6rem;
      font-family: var(--font-head);
      font-size: 0.68rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--ink-muted);
      text-decoration: none;
      opacity: 0.45;
      transition: opacity 0.25s ease;
    }

    .landing-footer:hover {
      opacity: 1;
    }

    /* ─── SECTION DIVIDER ─── */
    .landing-section {
      width: 100%;
      max-width: 900px;
      margin-top: 4rem;
    }

    .landing-section-label {
      font-family: var(--font-head);
      font-size: 0.68rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--ink-muted);
      opacity: 0.6;
      margin-bottom: 1.8rem;
    }

    @media (max-width: 600px) {
      .card-grid {
        grid-template-columns: 1fr;
        max-width: 340px;
      }
      .landing-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<main class="landing">

  <header class="landing-header">
    <p class="landing-series">Een verhalenserie</p>
    <h1 class="landing-title">De Stille Os en de Zilveren Kraanvogel</h1>
    <p class="landing-author">Hong Jong-du</p>
    <div class="landing-rule"></div>
  </header>

  <div class="card-grid">

    <a class="story-card" href="deel-1.html">
      <img class="card-illus" src="../Illustrations/1/1_1.png" aria-hidden="true" alt="" />
      <div class="card-content">
        <p class="card-deel">Deel I</p>
        <h2 class="card-title">Het Veld en de Lucht</h2>
        <p class="card-cta">Lees →</p>
      </div>
    </a>

    <a id="deel-2-card" class="story-card story-card--soon" aria-disabled="true">
      <img class="card-illus" id="deel-2-illus" src="../Illustrations/6/1.png" aria-hidden="true" alt="" style="display:none" />
      <div class="card-content">
        <p class="card-deel">Deel II</p>
        <h2 class="card-title">Schaduw van het Licht</h2>
        <p class="card-soon-label" id="deel-2-label">27 mei · 10:00</p>
      </div>
    </a>

    <div class="story-card story-card--soon">
      <div class="card-content">
        <p class="card-deel">Deel III</p>
        <h2 class="card-title" id="deel-3-title" style="display:none">Na de Vleugels</h2>
        <p class="card-soon-label" id="deel-3-label">Binnenkort</p>
      </div>
    </div>

  </div>

  <div class="landing-section">
    <p class="landing-section-label">Losse verhalen</p>
    <div class="card-grid">

      <div class="story-card story-card--soon">
        <div class="card-content">
          <h2 class="card-title">—</h2>
          <p class="card-subtitle"></p>
          <p class="card-soon-label">Binnenkort</p>
        </div>
      </div>

    </div>
  </div>


</main>


<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  (function () {
    var publishTime = new Date('2026-05-27T10:00:00');
    var card = document.getElementById('deel-2-card');
    var label = document.getElementById('deel-2-label');

    function checkUnlock() {
      if (new Date() >= publishTime) {
        card.href = 'deel-2.html';
        card.removeAttribute('aria-disabled');
        card.classList.remove('story-card--soon');
        label.textContent = 'Lees →';
        label.className = 'card-cta';
        document.getElementById('deel-2-illus').style.display = '';
        document.getElementById('deel-3-title').style.display = '';
        document.getElementById('deel-3-label').textContent = '10 juni · 10:00';
        clearInterval(interval);
      }
    }

    checkUnlock();
    var interval = setInterval(checkUnlock, 30000);
  })();
</script>
</body>
</html>
